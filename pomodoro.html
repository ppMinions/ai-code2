<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
  }
  .tabs { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
  .tab {
    padding: 0.5rem 1.25rem;
    border: none;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: #888;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab:hover { background: rgba(255,255,255,0.15); }
  .tab.active { background: rgba(255,255,255,0.2); color: #fff; font-weight: 600; }
  .timer-ring {
    position: relative;
    width: 280px; height: 280px;
    margin: 0 auto 2rem;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring .bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 6; }
  .timer-ring .progress {
    fill: none; stroke: #ff6b6b; stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s, stroke 0.3s;
  }
  .timer-ring .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .time { font-size: 3.5rem; font-weight: 300; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
  .phase-label { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
  .controls { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 2rem; }
  .btn {
    padding: 0.6rem 2rem;
    border: none;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: #ff6b6b; color: #fff; }
  .btn-primary:hover { background: #ff5252; transform: scale(1.02); }
  .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #ccc; }
  .btn-secondary:hover { background: rgba(255,255,255,0.18); }
  .stats { color: #666; font-size: 0.85rem; }
  .stats span { margin: 0 0.5rem; }
  .notification { color: #888; font-size: 0.8rem; margin-top: 1rem; min-height: 1.2rem; }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab active" data-mode="pomodoro">专注</button>
    <button class="tab" data-mode="shortBreak">短休</button>
    <button class="tab" data-mode="longBreak">长休</button>
  </div>

  <div class="timer-ring">
    <svg width="280" height="280" viewBox="0 0 280 280">
      <circle class="bg" cx="140" cy="140" r="130"/>
      <circle class="progress" id="progress" cx="140" cy="140" r="130"
        stroke-dasharray="816.8" stroke-dashoffset="0"/>
    </svg>
    <div class="center">
      <div class="time" id="display">25:00</div>
      <div class="phase-label" id="phaseLabel">专注时间</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="mainBtn">开始</button>
    <button class="btn btn-secondary" id="resetBtn">重置</button>
  </div>

  <div class="stats">
    已完成 <span id="completedCount">0</span> 个番茄
  </div>
  <div class="notification" id="notification"></div>
</div>

<script>
const DURATIONS = { pomodoro: 25, shortBreak: 5, longBreak: 15 };
const CIRCUMFERENCE = 2 * Math.PI * 130;

let mode = 'pomodoro';
let timeLeft = DURATIONS.pomodoro * 60;
let timerId = null;
let completed = parseInt(localStorage.getItem('pomodoro_count') || '0');
let currentSession = 0;

const display = document.getElementById('display');
const phaseLabel = document.getElementById('phaseLabel');
const progress = document.getElementById('progress');
const mainBtn = document.getElementById('mainBtn');
const resetBtn = document.getElementById('resetBtn');
const completedSpan = document.getElementById('completedCount');
const notification = document.getElementById('notification');

completedSpan.textContent = completed;

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateDisplay() {
  display.textContent = formatTime(timeLeft);
  const fraction = timeLeft / (DURATIONS[mode] * 60);
  progress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
  const labels = { pomodoro: '专注时间', shortBreak: '短休息', longBreak: '长休息' };
  phaseLabel.textContent = labels[mode];
}

function notify(msg) {
  notification.textContent = msg;
  setTimeout(() => { if (notification.textContent === msg) notification.textContent = ''; }, 4000);
}

function switchMode(newMode) {
  if (timerId) { clearInterval(timerId); timerId = null; mainBtn.textContent = '开始'; }
  mode = newMode;
  timeLeft = DURATIONS[mode] * 60;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  progress.style.stroke = mode === 'pomodoro' ? '#ff6b6b' : '#4ecdc4';
  updateDisplay();
  notification.textContent = '';
}

function tick() {
  timeLeft--;
  updateDisplay();
  if (timeLeft <= 0) {
    clearInterval(timerId); timerId = null;
    mainBtn.textContent = '开始';
    if (mode === 'pomodoro') {
      completed++; currentSession++;
      localStorage.setItem('pomodoro_count', completed);
      completedSpan.textContent = completed;
      const next = currentSession % 4 === 0 ? 'longBreak' : 'shortBreak';
      const label = next === 'longBreak' ? '长休息' : '短休息';
      notify(`🍅 完成! 开始${label}吧`);
      switchMode(next);
    } else {
      notify('休息结束，开始下一个番茄!');
      switchMode('pomodoro');
    }
  }
}

mainBtn.addEventListener('click', () => {
  if (timerId) {
    clearInterval(timerId); timerId = null;
    mainBtn.textContent = '继续';
  } else {
    timerId = setInterval(tick, 1000);
    mainBtn.textContent = '暂停';
  }
});

resetBtn.addEventListener('click', () => {
  if (timerId) { clearInterval(timerId); timerId = null; }
  mainBtn.textContent = '开始';
  timeLeft = DURATIONS[mode] * 60;
  updateDisplay();
  notification.textContent = '';
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchMode(tab.dataset.mode));
});

updateDisplay();
</script>
</body>
</html>
